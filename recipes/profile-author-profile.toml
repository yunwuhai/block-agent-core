[[recipes]]
id = "profile-author-context"
name = "Profile Author Context"
description = "Assembly recipe for profile-author subagent — loads policy docs, format guides, and registry specs"
zones = [
  { name = "profile-guides",  description = "Profile format and best-practice guides",  position = "before", separator = "---guide---" },
  { name = "policy-specs",    description = "Policy engine specs and evaluation rules",  position = "before", separator_before = "=== policy specs start ===", separator_after = "=== policy specs end ===" },
  { name = "registry-entries", description = "Active registry entries for current run", position = "before", separator = "" },
  { name = "run-artifacts",   description = "Previous run artifacts for continuation",   position = "after",  separator = "---artifact---" },
]
